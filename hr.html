      <h1>HR</h1>
      
<div class="max-w-2xl mx-auto p-6 bg-white rounded-2xl shadow-lg space-y-6">
  <h2 class="text-2xl font-bold">Создание триггера события</h2>

  <div class="space-y-4">
    <!-- Тип события -->
    <div>
      <label class="block text-sm font-medium mb-1">Тип события</label>
      <select class="w-full border rounded-lg p-2">
        <option>Выберите событие</option>
        <option>Окончание испытательного срока</option>
        <option>Постановка годовых целей</option>
        <option>Согласование отпуска</option>
      </select>
    </div>

    <!-- Условие срабатывания -->
    <div>
      <label class="block text-sm font-medium mb-1">Условие срабатывания</label>
      <div class="flex space-x-2">
        <input type="date" class="flex-1 border rounded-lg p-2" placeholder="Дата">
        <input type="number" class="w-28 border rounded-lg p-2" placeholder="+30 дней">
      </div>
    </div>

    <!-- Ответственные -->
    <div>
      <label class="block text-sm font-medium mb-1">Кому отправить уведомление</label>
      <input type="text" class="w-full border rounded-lg p-2" placeholder="Выберите сотрудников или роли">
    </div>

    <!-- Способ уведомления -->
    <div>
      <label class="block text-sm font-medium mb-1">Способ уведомления</label>
      <div class="flex space-x-3">
        <label class="flex items-center space-x-2">
          <input type="checkbox" class="rounded border-gray-300">
          <span>В системе</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" class="rounded border-gray-300">
          <span>По почте</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" class="rounded border-gray-300">
          <span>В мессенджере</span>
        </label>
      </div>
    </div>

    <!-- Текст уведомления -->
    <div>
      <label class="block text-sm font-medium mb-1">Текст уведомления</label>
      <textarea class="w-full border rounded-lg p-2" rows="4" placeholder="Введите текст уведомления с переменными..."></textarea>
    </div>

    <!-- Статус -->
    <div class="flex items-center space-x-2">
      <input type="checkbox" class="rounded border-gray-300" checked>
      <span>Активный триггер</span>
    </div>

    <!-- Кнопки -->
    <div class="flex justify-end space-x-4">
      <button class="btn-primary px-4 py-2 rounded-lg bg-gray-200 text-gray-700 hover:bg-gray-300">Отмена</button>
      <button class="btn-primary px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700">Сохранить триггер</button>
    </div>

  </div>
